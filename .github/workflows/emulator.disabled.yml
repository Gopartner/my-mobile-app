name: Emulator Tests

concurrency:
  group: emulator-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  emulator-test:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
        target: [google_apis]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -cache-size 512
          disable-animations: true
          script: ./gradlew connectedCheck

      - name: Upload logcat
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-${{ matrix.api-level }}
          path: ~/.android/avd/*.avd/*.log

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.api-level }}
          path: |
            app/build/outputs/androidTest-results/
            **/screenshots/

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-test-report-${{ matrix.api-level }}
          path: app/build/reports/androidTests/
