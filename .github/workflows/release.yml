name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate keystore (yudibilly - Surabaya)
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias yudibilly \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=yudibilly, L=Surabaya, ST=Jawa Timur, C=ID"
          echo "KEYSTORE_PASSWORD=android123" >> $GITHUB_ENV
          echo "KEY_ALIAS=yudibilly" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android123" >> $GITHUB_ENV

      - name: Build release APK & AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: keystore.jks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_id }}
          name: "Pythagoras v1.0.${{ github.run_id }}"
          body: |
            ## Pythagoras Calculator
            
            **Signed by:** yudibilly
            **Location:** Surabaya, Jawa Timur, Indonesia
            
            Hitung sisi miring segitiga siku-siku real-time.
            Input dalam cm, hasil dalam mm, cm, dan m.
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          make_latest: true
